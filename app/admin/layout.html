<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .page.title }} - Spacelift Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.378.0/font/lucide.css">
    <link rel="stylesheet" href="/public/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <a href="/" class="logo">spacelift</a>
            <nav class="nav-links">
                <a href="/" class="nav-link"><i class="icon-layout-dashboard"></i> Dashboard</a>
                <a href="/projects" class="nav-link"><i class="icon-clipboard-list"></i> Projects</a>
                <a href="/referrals" class="nav-link"><i class="icon-send"></i> Referrals</a>
                <a href="/professionals" class="nav-link"><i class="icon-building-2"></i> Professionals</a>
                <a href="/users" class="nav-link"><i class="icon-users"></i> Users</a>
            </nav>
            <div class="header-right">
                <div class="user-avatar">A</div>
            </div>
        </div>
    </header>

    <main class="main-content">
        {{ .children | trusted }}
    </main>

    <script>
    document.querySelectorAll('.nav-link').forEach(link => {
        const path = link.getAttribute('href');
        const loc = window.location.pathname;
        if ((path === '/' && loc === '/') || (path !== '/' && loc.startsWith(path))) {
            link.classList.add('active');
        }
    });
    </script>
</body>
</html>
