---
title: Accept Invitation
---
<div class="ob-step">Join Your Team</div>
<h2 class="ob-title">Accept your invitation</h2>

<div id="alert-container"></div>

<form id="accept-form" class="ob-form">
    <div class="ob-field">
        <label>Email</label>
        <input type="email" class="ob-input" placeholder="your@email.com" required>
    </div>
    <div class="ob-field">
        <label>Full Name</label>
        <input type="text" class="ob-input" placeholder="Your full name" required>
    </div>
    <input type="hidden" name="token" value="{{ .params.token }}">
    <button type="submit" class="ob-btn">Accept &amp; Continue</button>
</form>

<script>
document.getElementById('accept-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    try {
        const resp = await fetch('/api/invite/' + data.token + ':accept_invite', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await resp.json();
        document.getElementById('alert-container').innerHTML = resp.ok
            ? '<div class="alert alert-success">Invitation accepted! Welcome to Spacelift.</div>'
            : '<div class="alert alert-error">Error: ' + JSON.stringify(result) + '</div>';
    } catch(err) {
        document.getElementById('alert-container').innerHTML =
            '<div class="alert alert-error">' + err.message + '</div>';
    }
});
</script>
