---
title: Service Area
---
<div class="ob-step">Step 3 of 4</div>
<h2 class="ob-title">Service area</h2>

<form class="ob-form" id="onboarding-zipcode">
    <div class="map-container" data-map-zipcodes data-map-token="{{ .secrets.mapbox_token }}" style="height:250px;margin-bottom:0.875rem;margin-top:0"></div>
    <div class="ob-field">
        <label>Add Zip Codes</label>
        <div class="ob-zip-row">
            <input type="text" class="ob-input" placeholder="Enter zip code" id="zip-input" maxlength="5">
            <button type="button" class="ob-btn-add" id="zip-add">Add</button>
        </div>
    </div>

    <div class="ob-chips" id="zip-chips" data-zip-chips>
        <span class="ob-chip">90210 <button type="button" class="zip-remove">&times;</button></span>
        <span class="ob-chip">90211 <button type="button" class="zip-remove">&times;</button></span>
        <span class="ob-chip">90212 <button type="button" class="zip-remove">&times;</button></span>
    </div>

    <div class="ob-error" id="ob-error" style="display:none"></div>
    <button type="submit" class="ob-btn">Continue</button>
</form>

<script>
(function() {
    var chipsEl = document.getElementById('zip-chips');
    var inputEl = document.getElementById('zip-input');
    var addBtn = document.getElementById('zip-add');

    function addZip() {
        var val = inputEl.value.trim();
        if (val.length !== 5 || !/^\d{5}$/.test(val)) return;
        var existing = chipsEl.querySelectorAll('.ob-chip');
        for (var i = 0; i < existing.length; i++) {
            if (existing[i].childNodes[0].textContent.trim() === val) return;
        }
        var chip = document.createElement('span');
        chip.className = 'ob-chip';
        chip.innerHTML = val + ' <button type="button" class="zip-remove">&times;</button>';
        chipsEl.appendChild(chip);
        inputEl.value = '';
    }

    addBtn.addEventListener('click', addZip);
    inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); addZip(); }
    });

    chipsEl.addEventListener('click', function(e) {
        var removeBtn = e.target.closest('.zip-remove');
        if (removeBtn) {
            removeBtn.closest('.ob-chip').remove();
        }
    });

    document.getElementById('onboarding-zipcode').addEventListener('submit', function(e) {
        e.preventDefault();
        window.location.href = '/onboarding/preferences';
    });
})();
</script>
