---
title: Referrals
---
<div class="page-header">
    <h1>Referrals</h1>
</div>

<!-- Stats Cards -->
<div class="stats-grid stats-grid-3">
    <div class="stat-card">
        <div class="stat-info">
            <p class="stat-label stat-label-blue">Total</p>
            <p class="stat-value" id="stat-total">0</p>
        </div>
        <div class="stat-icon stat-icon-blue"><i class="icon-send"></i></div>
    </div>
    <div class="stat-card">
        <div class="stat-info">
            <p class="stat-label stat-label-green">Accepted</p>
            <p class="stat-value" id="stat-accepted">0</p>
        </div>
        <div class="stat-icon stat-icon-green"><i class="icon-circle-check"></i></div>
    </div>
    <div class="stat-card">
        <div class="stat-info">
            <p class="stat-label stat-label-purple">Connected</p>
            <p class="stat-value" id="stat-connected">0</p>
        </div>
        <div class="stat-icon stat-icon-purple"><i class="icon-handshake"></i></div>
    </div>
</div>

<div class="card">
    <div class="toolbar">
        <input type="text" class="search-input" placeholder="Search by contractor, project, or sender..." id="search-referrals">
        <select class="filter-select" id="filter-ref-status">
            <option value="">All Statuses</option>
            <option value="sent">Sent</option>
            <option value="viewed">Viewed</option>
            <option value="accepted">Accepted</option>
            <option value="declined">Declined</option>
            <option value="scheduled">Scheduled</option>
            <option value="connected">Connected</option>
        </select>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Contractor</th>
                <th>Project</th>
                <th>Status</th>
                <th>Sent</th>
                <th>Sender</th>
            </tr>
        </thead>
        <tbody id="referrals-table">
            <tr><td colspan="5" class="empty-state">No referrals yet</td></tr>
        </tbody>
    </table>
</div>

<script>
var _allReferrals = [];
function renderReferrals() {
    var q = document.getElementById('search-referrals').value.toLowerCase();
    var status = document.getElementById('filter-ref-status').value;
    var filtered = _allReferrals.filter(function(r) {
        if (q && !((r.organization_id||'')+(r.project_id||'')+(r.sender_id||'')).toLowerCase().includes(q)) return false;
        if (status && r.status !== status) return false;
        return true;
    });
    var tbody = document.getElementById('referrals-table');
    if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No referrals match</td></tr>'; return; }
    tbody.innerHTML = filtered.map(function(r) {
        var cls = {sent:'status-badge-yellow',accepted:'status-badge-blue',meeting_scheduled:'status-badge-purple',connected:'status-badge-green',declined:'status-badge-red'}[r.status] || '';
        return '<tr onclick="location.href=\'/referrals/' + r.id + '\'" style="cursor:pointer"><td><a href="/referrals/' + r.id + '">' + (r.organization_id||'-') + '</a></td><td>' + (r.project_id||'-') + '</td><td><span class="status-badge ' + cls + '">' + (r.status||'-') + '</span></td><td>' + (r.created_at ? new Date(parseInt(r.created_at)).toLocaleDateString() : '-') + '</td><td>' + (r.sender_id||'-') + '</td></tr>';
    }).join('');
}
document.getElementById('search-referrals').addEventListener('input', renderReferrals);
document.getElementById('filter-ref-status').addEventListener('change', renderReferrals);

(async function() {
    try {
        var resp = await fetch('/api/referral/list');
        _allReferrals = await resp.json();
        if (!Array.isArray(_allReferrals)) _allReferrals = [];
        document.getElementById('stat-total').textContent = _allReferrals.length;
        document.getElementById('stat-accepted').textContent = _allReferrals.filter(function(r) { return r.status === 'accepted'; }).length;
        document.getElementById('stat-connected').textContent = _allReferrals.filter(function(r) { return r.status === 'connected'; }).length;
        renderReferrals();
    } catch(e) { console.error('Failed to load referrals:', e); }
})();
</script>
