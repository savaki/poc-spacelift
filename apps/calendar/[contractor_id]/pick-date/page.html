---
title: Pick a Date
---
<div class="cal-card">
    <div class="cal-steps">
        <div class="cal-step-dot done">&#10003;</div>
        <div class="cal-step-line done"></div>
        <div class="cal-step-dot active">2</div>
        <div class="cal-step-line"></div>
        <div class="cal-step-dot">3</div>
        <div class="cal-step-line"></div>
        <div class="cal-step-dot">4</div>
    </div>
    <a href="/{{ .params.contractor_id }}" class="cal-back" up-target=".cal-card">&larr; Back</a>
    <h2 style="margin-bottom:1rem;font-size:1.125rem">Pick a Date</h2>

    <div id="calendar-widget"></div>
</div>

<script>
(function() {
    var contractorId = '{{ .params.contractor_id }}';
    var availabilityData = {{ .data.availability | trusted }};
    var slots = (Array.isArray(availabilityData) ? availabilityData : []).filter(function(s) {
        return s.user_id === contractorId && s.status === 'active';
    });

    var widget = document.getElementById('calendar-widget');
    if (slots.length === 0) {
        var p = document.createElement('p');
        p.style.cssText = 'text-align:center;padding:2rem 0;color:var(--mz-color-gray-500)';
        p.textContent = 'This contractor has no availability set up yet.';
        widget.appendChild(p);
        return;
    }

    var now = new Date();
    var calYear = parseInt('{{ .query.year }}') || now.getFullYear();
    var calMonth = (parseInt('{{ .query.month }}') || (now.getMonth() + 1)) - 1;
    var availDays = getAvailableDays(slots);

    // Navigation
    var nav = document.createElement('div');
    nav.className = 'cal-nav';

    var prevM = calMonth === 0 ? 12 : calMonth;
    var prevY = calMonth === 0 ? calYear - 1 : calYear;
    var nextM = calMonth === 11 ? 1 : calMonth + 2;
    var nextY = calMonth === 11 ? calYear + 1 : calYear;
    var baseUrl = '/' + contractorId + '/pick-date';

    var prevLink = document.createElement('a');
    prevLink.href = baseUrl + '?year=' + prevY + '&month=' + prevM;
    prevLink.className = 'cal-back';
    prevLink.style.margin = '0';
    prevLink.setAttribute('up-target', '.cal-card');
    prevLink.textContent = '\u2190';
    nav.appendChild(prevLink);

    var title = document.createElement('span');
    title.className = 'cal-nav-title';
    title.textContent = MONTH_NAMES[calMonth] + ' ' + calYear;
    nav.appendChild(title);

    var nextLink = document.createElement('a');
    nextLink.href = baseUrl + '?year=' + nextY + '&month=' + nextM;
    nextLink.className = 'cal-back';
    nextLink.style.margin = '0';
    nextLink.setAttribute('up-target', '.cal-card');
    nextLink.textContent = '\u2192';
    nav.appendChild(nextLink);

    widget.appendChild(nav);

    // Weekday headers
    var weekdays = document.createElement('div');
    weekdays.className = 'cal-weekdays';
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d) {
        var div = document.createElement('div');
        div.textContent = d;
        weekdays.appendChild(div);
    });
    widget.appendChild(weekdays);

    // Day grid
    var grid = document.createElement('div');
    grid.className = 'cal-days';

    var firstDay = new Date(calYear, calMonth, 1).getDay();
    var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    var today = new Date(); today.setHours(0, 0, 0, 0);

    for (var i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement('div'));
    }

    for (var d = 1; d <= daysInMonth; d++) {
        var date = new Date(calYear, calMonth, d);
        var isPast = date < today;
        var hasAvail = !!availDays[date.getDay()];
        var isToday = date.getTime() === today.getTime();

        if (!isPast && hasAvail) {
            var a = document.createElement('a');
            a.href = '/' + contractorId + '/pick-time?date=' + date.toISOString().slice(0, 10);
            a.className = 'cal-day in-month available' + (isToday ? ' today' : '');
            a.setAttribute('up-target', '.cal-card');
            a.textContent = d;
            grid.appendChild(a);
        } else {
            var div = document.createElement('div');
            div.className = 'cal-day in-month' + (isToday ? ' today' : '') + (isPast ? ' disabled' : '');
            div.textContent = d;
            grid.appendChild(div);
        }
    }

    widget.appendChild(grid);
})();
</script>
