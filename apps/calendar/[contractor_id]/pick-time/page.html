---
title: Pick a Time
---
<div class="cal-card">
    <div class="cal-steps">
        <div class="cal-step-dot done">&#10003;</div>
        <div class="cal-step-line done"></div>
        <div class="cal-step-dot done">&#10003;</div>
        <div class="cal-step-line done"></div>
        <div class="cal-step-dot active">3</div>
        <div class="cal-step-line"></div>
        <div class="cal-step-dot">4</div>
    </div>
    <a href="/{{ .params.contractor_id }}/pick-date" class="cal-back" up-target=".cal-card">&larr; Back</a>
    <h2 style="margin-bottom:0.25rem;font-size:1.125rem">Select a Time</h2>
    <p style="color:var(--mz-color-gray-500);margin-bottom:1rem;font-size:0.875rem">{{ .query.date }}</p>

    <div data-time-slots
         class="cal-slots"
         data-contractor-id="{{ .params.contractor_id }}"
         data-date="{{ .query.date }}"
         data-select-url="/{{ .params.contractor_id }}/book">
        <script type="application/json" data-availability>{{ .data.availability | trusted }}</script>
        <div class="cal-loading">Checking availability...</div>
    </div>
</div>
