---
title: Professional Detail
---
<div class="page-header">
    <a href="/professionals" class="back-link">&larr; Back to Professionals</a>
    <h1>Professional Detail</h1>
</div>

<div class="detail-grid">
    <div class="card">
        <h3 class="card-title">Company Information</h3>
        <dl class="detail-list">
            <dt>Company Name</dt>
            <dd>-</dd>
            <dt>Type</dt>
            <dd>-</dd>
            <dt>Email</dt>
            <dd>-</dd>
            <dt>Phone</dt>
            <dd>-</dd>
            <dt>Website</dt>
            <dd>-</dd>
            <dt>Verification</dt>
            <dd><span class="status-badge">-</span></dd>
        </dl>
    </div>
    <div class="card">
        <h3 class="card-title">Specialties</h3>
        <div class="tag-list">
            <span class="tag">No preferences set</span>
        </div>
    </div>
</div>

<div class="card">
    <h3 class="card-title">Service Area</h3>
    <div class="map-placeholder">
        <p>Service area map will render here</p>
    </div>
</div>

<script>
const orgId = '{{ .params.id }}';
(async function loadOrg() {
    try {
        const resp = await fetch('/api/organization/' + orgId);
        const data = await resp.json();
        const o = Array.isArray(data) ? data[0] : data;
        if (!o) return;
        const dds = document.querySelectorAll('.detail-list dd');
        dds[0].textContent = o.name || '-';
        dds[1].textContent = o.organization_type || '-';
        dds[2].textContent = o.email || '-';
        dds[3].textContent = o.phone || '-';
        dds[4].textContent = o.website || '-';
        dds[5].innerHTML = '<span class="status-badge">' + (o.verification_status || '-') + '</span>';
    } catch(e) { console.error('Failed to load organization:', e); }
})();
</script>
