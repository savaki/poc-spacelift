---
title: Project Preferences
---
<div class="ob-step">Step 4 of 4</div>
<h2 class="ob-title">Project preferences</h2>

<form class="ob-form" id="onboarding-prefs">
    <div class="ob-field">
        <label>Project Types You Want</label>
        <div class="ob-toggles">
            <button type="button" class="ob-toggle selected">Kitchen</button>
            <button type="button" class="ob-toggle selected">Bathroom</button>
            <button type="button" class="ob-toggle">Whole Home</button>
            <button type="button" class="ob-toggle">Outdoor</button>
        </div>
    </div>

    <div class="ob-field">
        <label>Project Types You Don't Want</label>
        <div class="ob-toggles">
            <button type="button" class="ob-toggle">Kitchen</button>
            <button type="button" class="ob-toggle">Bathroom</button>
            <button type="button" class="ob-toggle">Whole Home</button>
            <button type="button" class="ob-toggle selected">Outdoor</button>
        </div>
    </div>

    <div class="ob-field">
        <label>Budget Range</label>
        <div class="ob-row">
            <div class="ob-field" style="flex:1;margin-bottom:0">
                <input type="number" class="ob-input" placeholder="$10,000" value="10000">
            </div>
            <span class="ob-range-sep">&ndash;</span>
            <div class="ob-field" style="flex:1;margin-bottom:0">
                <input type="number" class="ob-input" placeholder="$100,000" value="100000">
            </div>
        </div>
    </div>

    <div class="ob-error" id="ob-error" style="display:none"></div>
    <button type="submit" class="ob-btn">Complete Setup</button>
</form>

<script>
(function() {
    var form = document.getElementById('onboarding-prefs');

    form.addEventListener('click', function(e) {
        var toggle = e.target.closest('.ob-toggle');
        if (toggle) {
            toggle.classList.toggle('selected');
        }
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var wanted = [];
        var unwanted = [];
        var sections = form.querySelectorAll('.ob-field');
        sections[0].querySelectorAll('.ob-toggle.selected').forEach(function(t) { wanted.push(t.textContent.trim()); });
        sections[1].querySelectorAll('.ob-toggle.selected').forEach(function(t) { unwanted.push(t.textContent.trim()); });
        var inputs = form.querySelectorAll('input[type="number"]');
        var prefs = {
            wanted_types: wanted,
            unwanted_types: unwanted,
            budget_min: inputs[0] ? inputs[0].value : '',
            budget_max: inputs[1] ? inputs[1].value : ''
        };
        localStorage.setItem('onboarding_preferences', JSON.stringify(prefs));
        localStorage.removeItem('onboarding_org_id');
        localStorage.removeItem('onboarding_user_id');
        window.location.href = '/';
    });
})();
</script>
