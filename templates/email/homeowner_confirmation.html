<html>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:system-ui,sans-serif">
<div style="max-width:560px;margin:0 auto;padding:32px 16px">
<div style="background:#fff;border-radius:12px;padding:32px">
    <h1 style="font-size:24px;font-weight:700;color:#18181b;margin:0 0 8px">Visit Confirmed</h1>
    <p style="color:#71717a;font-size:14px">Your visit has been scheduled</p>
    <table style="width:100%;font-size:14px;margin:16px 0">
        <tr>
            <td style="padding:6px 0;color:#71717a">Date</td>
            <td style="font-weight:600">{{ .input.scheduled_date }}</td>
        </tr>
        <tr>
            <td style="padding:6px 0;color:#71717a">Time</td>
            <td style="font-weight:600">{{ .input.start_time }}</td>
        </tr>
        <tr>
            <td style="padding:6px 0;color:#71717a">Address</td>
            <td style="font-weight:600">{{ .input.location_street }}, {{ .input.location_city }}</td>
        </tr>
    </table>
    <p><a href="https://calendar.spacelift.com/visit/{{ .input.visit_token }}" style="color:#2563eb;text-decoration:none;font-weight:600">View Your Visit &rarr;</a></p>
</div>
</div>
</body>
</html>
